 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script>
// منع كليك يمين
document.addEventListener('contextmenu', function(e) {
    e.preventDefault();
});

// منع اختصارات النسخ
document.addEventListener('keydown', function(e) {
    // Ctrl + C
    if (e.ctrlKey && e.key === 'c') {
        e.preventDefault();
    }

    // Ctrl + U (عرض سورس)
    if (e.ctrlKey && e.key === 'u') {
        e.preventDefault();
    }

    // Ctrl + S (حفظ الصفحة)
    if (e.ctrlKey && e.key === 's') {
        e.preventDefault();
    }

    // Ctrl + A (تحديد الكل)
    if (e.ctrlKey && e.key === 'a') {
        e.preventDefault();
    }

    // Ctrl + X (قص)
    if (e.ctrlKey && e.key === 'x') {
        e.preventDefault();
    }
});

// منع التحديد بالماوس
document.addEventListener('selectstart', function(e) {
    e.preventDefault();
});

// منع السحب
document.addEventListener('dragstart', function(e) {
    e.preventDefault();
});
</script>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Tajawal', sans-serif; }
    .exam-card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .exam-card:hover {
      transform: translateY(-4px);
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-in {
      animation: fadeUp 0.5s ease forwards;
      opacity: 0;
    }
  </style>

 </head>
 <body class="h-full">
  <div id="app" class="w-full h-full overflow-auto" style="background: #0f172a;"><!-- Header -->
   <div style="background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 50%, #1a1a2e 100%);" class="w-full py-16 px-4 text-center relative overflow-hidden">
    <div style="position:absolute;inset:0;background:radial-gradient(circle at 30% 50%, rgba(59,130,246,0.15) 0%, transparent 50%);"></div>
    <div style="position:absolute;inset:0;background:radial-gradient(circle at 70% 30%, rgba(168,85,247,0.1) 0%, transparent 50%);"></div>
    <div class="relative z-10">
     <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full mb-6" style="background:rgba(59,130,246,0.15);border:1px solid rgba(59,130,246,0.3);"><i data-lucide="graduation-cap" style="width:18px;height:18px;color:#60a5fa;"></i> <span style="color:#93bbfc;font-size:14px;">زاد المعرفة</span>
     </div>
     <h1 id="page-title" class="text-4xl md:text-5xl font-800 mb-4" style="color:#f1f5f9;">بنك الامتحانات</h1>
     <p id="subtitle" class="text-lg" style="color:#94a3b8;">جميع الامتحانات والمراجعات في مكان واحد</p>
    </div>
   </div><!-- Cards Grid -->
   <div class="max-w-4xl mx-auto px-4 py-10">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="cards-container">
    </div>
   </div><!-- Footer -->
   <div class="text-center py-8 px-4">
    <p style="color:#475569;font-size:14px;">زاد المعرفة © 2025</p>
   </div>
  </div>
  <script>
const exams = [
  { title: "الكليات الخمسة", icon: "layers", color: "#3b82f6", url: "https://zadalmrfh-create.github.io/The-five-colleges/" },
  { title: "الكل والكلية", icon: "book-open", color: "#8b5cf6", url: "https://zadalmrfh-create.github.io/Everything-and-the-college/" },
  { title: "المعرفات", icon: "fingerprint", color: "#06b6d4", url: "https://zadalmrfh-create.github.io/Identifiers/" },
  { title: "محافظات التوحيد أدبي", icon: "pen-tool", color: "#f59e0b", url: "https://zadalmrfh-create.github.io/Provinces-of-Literary-Unity/" },
  { title: "امتحان صرف (١)", icon: "clipboard-list", color: "#ec4899", url: "https://zadalmrfh-create.github.io/---/" },
  { title: "امتحان صرف  (٢)", icon: "clipboard-check", color: "#14b8a6", url: "https://zadalmrfh-create.github.io/----/" },
  { title: "امتحان صرف (٣)", icon: "award", color: "#f97316", url: "https://zadalmrfh-create.github.io/-----/" },
  { title: "سورة الطارق", icon: "layers", color: "#3b82f6", url: "https://zadalmrfh-create.github.io/tafser/" },
  { title: "سورة الاعلي", icon: "layers", color: "#3b82f6", url: "https://zadalmrfh-create.github.io/tafser-alahla/" },
  { title: "سورة الغاشية", icon: "layers", color: "#3b82f6", url: "https://zadalmrfh-create.github.io/tafser-algashea/" },
  { title: "سورة الفجر", icon: "layers", color: "#3b82f6", url: "https://zadalmrfh-create.github.io/tafser-alfgr/" },
  { title: "سورة البلد", icon: "layers", color: "#3b82f6", url: "https://zadalmrfh-create.github.io/tafser-albald/" },
  { title: "سورة الشمس", icon: "layers", color: "#3b82f6", url: "https://zadalmrfh-create.github.io/tafser-alshams/" },
  { title: "سورة الليل", icon: "layers", color: "#3b82f6", url: "https://zadalmrfh-create.github.io/tafser-allyal/" },
  { title: "سورة الضحي", icon: "layers", color: "#3b82f6", url: "https://zadalmrfh-create.github.io/tafser-aldouha/" },
  { title: "سورة الشرح", icon: "layers", color: "#3b82f6", url: "https://zadalmrfh-create.github.io/tafser-alsharh/" },
  { title: "سورة التين", icon: "layers", color: "#3b82f6", url: "https://zadalmrfh-create.github.io/tafser-alten/" },
];

const container = document.getElementById('cards-container');

exams.forEach((exam, i) => {
  const card = document.createElement('a');
  card.href = exam.url;
  card.target = "_blank";
  card.rel = "noopener noreferrer";
  card.className = "exam-card animate-in flex items-center gap-4 p-5 rounded-2xl cursor-pointer";
  card.style.cssText = `background:rgba(30,58,95,0.4);border:1px solid rgba(59,130,246,0.12);animation-delay:${i * 0.07}s;text-decoration:none;`;
  card.innerHTML = `
    <div class="flex-shrink-0 w-12 h-12 rounded-xl flex items-center justify-center" style="background:${exam.color}20;border:1px solid ${exam.color}40;">
      <i data-lucide="${exam.icon}" style="width:22px;height:22px;color:${exam.color};"></i>
    </div>
    <div class="flex-1 min-w-0">
      <h3 class="font-700 text-lg" style="color:#e2e8f0;">${exam.title}</h3>
    </div>
    <i data-lucide="external-link" style="width:18px;height:18px;color:#64748b;flex-shrink:0;"></i>
  `;
  card.addEventListener('mouseenter', () => {
    card.style.borderColor = exam.color + '50';
    card.style.background = 'rgba(30,58,95,0.7)';
  });
  card.addEventListener('mouseleave', () => {
    card.style.borderColor = 'rgba(59,130,246,0.12)';
    card.style.background = 'rgba(30,58,95,0.4)';
  });
  container.appendChild(card);
});

lucide.createIcons();

// Element SDK
const defaultConfig = {
  page_title: "بنك الامتحانات",
  subtitle: "جميع الامتحانات والمراجعات في مكان واحد",
  background_color: "#0f172a",
  surface_color: "#1e3a5f",
  text_color: "#e2e8f0",
  primary_action: "#3b82f6",
  secondary_action: "#94a3b8",
  font_family: "Tajawal",
  font_size: 16
};

function applyConfig(config) {
  const c = { ...defaultConfig, ...config };
  document.getElementById('page-title').textContent = c.page_title;
  document.getElementById('subtitle').textContent = c.subtitle;
  document.getElementById('app').style.background = c.background_color;
  document.getElementById('page-title').style.color = c.text_color;
  document.getElementById('subtitle').style.color = c.secondary_action;

  const font = c.font_family + ", 'Tajawal', sans-serif";
  document.getElementById('page-title').style.fontFamily = font;
  document.getElementById('subtitle').style.fontFamily = font;

  const base = c.font_size;
  document.getElementById('page-title').style.fontSize = (base * 2.5) + 'px';
  document.getElementById('subtitle').style.fontSize = (base * 1.1) + 'px';
}

if (window.elementSdk) {
  window.elementSdk.init({
    defaultConfig,
    onConfigChange: async (config) => applyConfig(config),
    mapToCapabilities: (config) => ({
      recolorables: [
        { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
        { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
        { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
        { get: () => config.primary_action || defaultConfig.primary_action, set: (v) => { config.primary_action = v; window.elementSdk.setConfig({ primary_action: v }); } },
        { get: () => config.secondary_action || defaultConfig.secondary_action, set: (v) => { config.secondary_action = v; window.elementSdk.setConfig({ secondary_action: v }); } },
      ],
      borderables: [],
      fontEditable: {
        get: () => config.font_family || defaultConfig.font_family,
        set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
      },
      fontSizeable: {
        get: () => config.font_size || defaultConfig.font_size,
        set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); }
      }
    }),
    mapToEditPanelValues: (config) => new Map([
      ["page_title", config.page_title || defaultConfig.page_title],
      ["subtitle", config.subtitle || defaultConfig.subtitle]
    ])
  });
}
</script>
