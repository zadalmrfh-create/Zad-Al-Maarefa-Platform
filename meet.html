<!doctype html>
<html lang="ar" dir="rtl" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;600;700;800&amp;display=swap" rel="stylesheet">
  <style>
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
    @keyframes pulse-ring { 0%{transform:scale(1);opacity:.4} 100%{transform:scale(1.6);opacity:0} }
    .float-anim { animation: float 3s ease-in-out infinite; }
    .pulse-ring { animation: pulse-ring 2s ease-out infinite; }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app" class="h-full w-full overflow-auto flex items-center justify-center" style="background: #0b1a2e; font-family: 'Noto Kufi Arabic', sans-serif;">
   <!-- Decorative circles -->
   <div style="position:fixed;top:-80px;right:-80px;width:260px;height:260px;border-radius:50%;background:rgba(0,187,153,0.08);"></div>
   <div style="position:fixed;bottom:-100px;left:-60px;width:300px;height:300px;border-radius:50%;background:rgba(66,133,244,0.07);"></div>
   <div class="text-center px-6 py-12 max-w-lg mx-auto">
    <!-- Icon -->
    <div class="float-anim mb-8 inline-block relative">
     <div class="pulse-ring absolute inset-0 rounded-full" style="background: rgba(0,187,153,0.2);"></div>
     <div class="w-24 h-24 rounded-3xl flex items-center justify-center mx-auto" style="background: linear-gradient(135deg, #00bb99, #4285f4);">
      <i data-lucide="video" style="width:44px;height:44px;color:#fff;"></i>
     </div>
    </div><!-- Title -->
    <h1 id="title" class="text-3xl font-extrabold mb-3" style="color: #e8f0fe;">انضم للاجتماع</h1><!-- Description -->
    <p id="description" class="text-lg mb-10" style="color: #8eaac4;">اضغط على الزر للانضمام عبر Google Meet</p><!-- Button --> <a id="join-btn" href="https://meet.google.com/syf-qzih-uib" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-3 px-10 py-4 rounded-2xl text-xl font-bold transition-all duration-300 hover:scale-105 hover:shadow-lg" style="background: linear-gradient(135deg, #00bb99, #4285f4); color: #fff; text-decoration: none; box-shadow: 0 8px 32px rgba(0,187,153,0.3);"> <i data-lucide="external-link" style="width:22px;height:22px;"></i> <span id="btn-text">انضم الآن</span> </a> <!-- Meeting ID -->
    <div class="mt-10 inline-flex items-center gap-2 px-5 py-3 rounded-xl" style="background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08);">
     <i data-lucide="link" style="width:16px;height:16px;color:#8eaac4;"></i> <span style="color:#8eaac4;font-size:14px;direction:ltr;">meet.google.com/syf-qzih-uib</span>
    </div>
   </div>
  </div>
  <script>
    lucide.createIcons();

    const defaultConfig = {
      page_title: 'المحاضرة الثالثة لمادة الصرف',
      meeting_description: 'اضغط على الزر للانضمام عبر Google Meet',
      button_text: 'انضم الآن',
      background_color: '#0b1a2e',
      text_color: '#e8f0fe',
      accent_color: '#00bb99',
      secondary_text_color: '#8eaac4',
      font_family: 'Noto Kufi Arabic',
      font_size: 16
    };

    function applyConfig(config) {
      document.getElementById('title').textContent = config.page_title || defaultConfig.page_title;
      document.getElementById('description').textContent = config.meeting_description || defaultConfig.meeting_description;
      document.getElementById('btn-text').textContent = config.button_text || defaultConfig.button_text;

      const app = document.getElementById('app');
      app.style.background = config.background_color || defaultConfig.background_color;

      const font = config.font_family || defaultConfig.font_family;
      app.style.fontFamily = `${font}, sans-serif`;

      const base = config.font_size || defaultConfig.font_size;
      document.getElementById('title').style.fontSize = `${base * 1.9}px`;
      document.getElementById('description').style.fontSize = `${base * 1.1}px`;

      document.getElementById('title').style.color = config.text_color || defaultConfig.text_color;
      document.getElementById('description').style.color = config.secondary_text_color || defaultConfig.secondary_text_color;
    }

    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => applyConfig(config),
      mapToCapabilities: (config) => ({
        recolorables: [
          { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
          { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
          { get: () => config.secondary_text_color || defaultConfig.secondary_text_color, set: (v) => { config.secondary_text_color = v; window.elementSdk.setConfig({ secondary_text_color: v }); } },
          { get: () => config.accent_color || defaultConfig.accent_color, set: (v) => { config.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); } }
        ],
        borderables: [],
        fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
        fontSizeable: { get: () => config.font_size || defaultConfig.font_size, set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); } }
      }),
      mapToEditPanelValues: (config) => new Map([
        ['page_title', config.page_title || defaultConfig.page_title],
        ['meeting_description', config.meeting_description || defaultConfig.meeting_description],
        ['button_text', config.button_text || defaultConfig.button_text]
      ])
    });
  </script>

</html>
