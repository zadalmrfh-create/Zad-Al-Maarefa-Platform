<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إنشاء حساب</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.3.3/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-900 text-white flex items-center justify-center h-screen">

  <div class="bg-gray-800 p-8 rounded-2xl shadow-lg w-96">
    <h1 class="text-2xl font-bold mb-6 text-center">إنشاء حساب جديد</h1>
    
    <form action="#" method="POST" class="flex flex-col gap-4">
      <input type="text" name="name" placeholder="الاسم الكامل" required class="p-3 rounded-lg bg-gray-700 border border-gray-600 focus:outline-none focus:ring-2 focus:ring-amber-400">
      <input type="email" name="email" placeholder="البريد الإلكتروني" required class="p-3 rounded-lg bg-gray-700 border border-gray-600 focus:outline-none focus:ring-2 focus:ring-amber-400">
      <input type="password" name="password" placeholder="كلمة المرور" required class="p-3 rounded-lg bg-gray-700 border border-gray-600 focus:outline-none focus:ring-2 focus:ring-amber-400">
      <button type="submit" class="bg-amber-300 text-gray-900 font-semibold p-3 rounded-lg hover:scale-[1.05] transition">إنشاء الحساب</button>
    </form>

    <p class="text-center mt-4 text-gray-400">
      لديك حساب بالفعل؟ 
      <a href="login.html" class="text-amber-300 hover:underline">تسجيل الدخول</a>
    </p>
  </div>

</body>
</html>
