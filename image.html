<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>طلاب المنصة المتميزون</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  user-select: none;
}

img {
  pointer-events: none;
}

/* Overlay */
#viewer {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

#viewer img {
  max-width: 90%;
  max-height: 90%;
}

/* watermark */
.watermark {
  position: absolute;
  color: rgba(255,255,255,0.2);
  font-size: 40px;
  transform: rotate(-30deg);
  pointer-events: none;
}

/* منع الطباعة */
@media print {
  body * {
    display: none !important;
  }
}
</style>

</head>

<body class="bg-gray-100 p-6">

<h1 class="text-3xl text-center mb-10 font-bold">
طلاب المنصة المتميزون
</h1>

<div id="list" class="grid md:grid-cols-3 gap-6"></div>

<!-- Viewer -->
<div id="viewer">
  <span onclick="closeViewer()" style="position:absolute;top:20px;right:30px;color:white;font-size:30px;cursor:pointer">✖</span>
  
  <div style="position:relative;">
    <img id="viewerImg">
    <div class="watermark" id="watermarkText"></div>
  </div>
</div>

<script>

// 🔒 حماية
document.addEventListener("contextmenu", e => e.preventDefault());

document.addEventListener("keydown", function(e) {
  if (e.ctrlKey && ["c","x","u","s","p"].includes(e.key.toLowerCase())) {
    e.preventDefault();
  }
});

// بياناتك
const data = [
{
  name: "مالك سامح",
  img: "https://drive.google.com/uc?export=view&id=1itY3DvtqdohO9RP_ERrFzHd8Fa7-EosA"
}
];

// عرض الكروت
const list = document.getElementById("list");

list.innerHTML = data.map(s => `
<div class="bg-white p-4 rounded shadow text-center">

  <h2 class="text-xl font-bold mb-4">${s.name}</h2>

  <button onclick="openViewer('${s.img}','${s.name}')" 
    class="bg-blue-600 text-white px-4 py-2 rounded">
    عرض الشهادة
  </button>

</div>
`).join("");


// فتح الشهادة
function openViewer(img, name) {
  document.getElementById("viewer").style.display = "flex";
  document.getElementById("viewerImg").src = img;

  // watermark
  document.getElementById("watermarkText").innerText = name;
}

// قفل
function closeViewer() {
  document.getElementById("viewer").style.display = "none";
}

</script>

</body>
</html>
