<!doctype html>
<html lang="ar" dir="rtl" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>طلاب المنصة المتميزون</title>

  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

  <style>
    body {
      box-sizing: border-box;
      user-select: none; /* منع التحديد */
    }

    img {
      pointer-events: none; /* منع سحب الصورة */
    }
  </style>
</head>

<body class="h-full bg-gradient-to-b from-slate-900 via-slate-800 to-slate-900 m-0 p-0">

<div class="h-full w-full overflow-auto bg-gradient-to-b from-blue-50 to-indigo-50">

  <!-- Header -->
  <header class="bg-gradient-to-r from-blue-600 to-indigo-600 text-white py-12 px-6 shadow-lg">
    <div class="max-w-6xl mx-auto text-center">
      <h1 class="text-4xl font-bold mb-2">طلاب المنصة المتميزون</h1>
      <p class="text-lg text-blue-100">شهادات تقدير للطلاب المتميزين</p>
    </div>
  </header>

  <!-- Main -->
  <main class="max-w-6xl mx-auto px-6 py-12">

    <div id="certificatesList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

    <div id="emptyState" class="text-center py-16 hidden">
      <i data-lucide="award" style="width: 64px; height: 64px; color: #9ca3af;"></i>
      <p class="text-gray-500 text-lg mt-4">لا توجد شهادات بعد.</p>
    </div>

  </main>

  <!-- Footer -->
  <footer class="bg-gray-800 text-gray-300 py-8 text-center">
    <p>© 2024 منصة الطلاب المتميزين - جميع الحقوق محفوظة</p>
  </footer>

</div>

<script>

  // 🔒 منع الكليك يمين
  document.addEventListener("contextmenu", e => e.preventDefault());

  // 🔒 منع اختصارات النسخ
  document.addEventListener("keydown", function(e) {
    if (e.ctrlKey && ["c","x","u","s"].includes(e.key.toLowerCase())) {
      e.preventDefault();
    }
  });

  // 🔒 منع السحب
  document.addEventListener("dragstart", e => e.preventDefault());

  // =====================================================
  // 🎓 البيانات
  // =====================================================
  const CERTIFICATES_DATA = [
    {
      student_name: "مالك سامح",
      certificate_url: "https://drive.google.com/uc?export=view&id=1itY3DvtqdohO9RP_ERrFzHd8Fa7-EosA"
    }
  ];

  // =====================================================

  function renderCertificates() {
    const list = document.getElementById('certificatesList');
    const emptyState = document.getElementById('emptyState');

    if (CERTIFICATES_DATA.length === 0) {
      list.innerHTML = '';
      emptyState.classList.remove('hidden');
      return;
    }

    emptyState.classList.add('hidden');

    list.innerHTML = CERTIFICATES_DATA.map(cert => `
      <div class="bg-white rounded-lg shadow-md hover:shadow-lg transition overflow-hidden">

        <div class="bg-gradient-to-r from-blue-500 to-indigo-500">
          <img 
            src="${cert.certificate_url}"
            alt="شهادة ${cert.student_name}"
            class="w-full h-48 object-cover"
          >
        </div>

        <div class="p-6">
          <h3 class="text-xl font-bold text-gray-800 mb-4 text-center">
            ${cert.student_name}
          </h3>

          <a 
            href="${cert.certificate_url}" 
            target="_blank"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 px-4 rounded-lg flex items-center justify-center gap-2"
          >
            <i data-lucide="download" style="width:18px;"></i>
            تحميل الشهادة
          </a>
        </div>

      </div>
    `).join('');

    lucide.createIcons();
  }

  document.addEventListener('DOMContentLoaded', renderCertificates);

</script>

</body>
</html>
