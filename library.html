<!doctype html>
<html lang="ar" dir="rtl" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;600;700;800&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Noto Kufi Arabic', sans-serif; }
    .book-card { transition: transform 0.3s ease, box-shadow 0.3s ease; }
    .book-card:hover { transform: translateY(-6px); box-shadow: 0 20px 40px rgba(0,0,0,0.15); }
    .download-btn { transition: all 0.25s ease; cursor: pointer; }
    .download-btn:hover { transform: scale(1.05); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .animate-card { animation: fadeUp 0.5s ease forwards; opacity: 0; }
    .filter-btn { transition: all 0.2s ease; cursor: pointer; }
    .filter-btn.active { transform: scale(1.05); }
    .search-box { transition: all 0.3s ease; }
    .search-box:focus { box-shadow: 0 0 0 3px rgba(240, 192, 64, 0.2); outline: none; }
    .sort-badge { transition: all 0.2s ease; cursor: pointer; }
    .sort-badge:hover { transform: scale(1.05); }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <style>
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 1000; }
    .modal-overlay.active { display: flex; }
    .modal-content { background: white; border-radius: 16px; padding: 24px; max-width: 500px; width: 90%; max-height: 90%; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .star-rating { display: flex; gap: 6px; font-size: 28px; cursor: pointer; }
    .star-rating i { cursor: pointer; transition: all 0.2s; opacity: 0.4; }
    .star-rating i:hover, .star-rating i.active { opacity: 1; transform: scale(1.1); }
    .review-item { background: #f1f5f9; border-radius: 12px; padding: 12px; margin-bottom: 8px; }
    .review-item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .review-stars { color: #f0c040; font-size: 14px; }
    * { user-select: none; -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; }
  </style>
 </head>
 <body class="h-full">
  <div id="app" class="w-full h-full overflow-auto" style="background-color: #0f172a;">
   <div class="text-center py-10 px-4" style="background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);">
    <div class="text-5xl mb-4">
     📚
    </div>
    <h1 id="main-title" class="text-3xl md:text-4xl font-extrabold mb-3" style="color: #f0c040;">مكتبة أولى ثانوي</h1>
    <p id="main-subtitle" class="text-lg" style="color: #94a3b8;">الترم الثاني – كل الكتب في مكان واحد 🚀</p>
    <div class="mt-6 flex justify-center gap-3"><button id="theme-toggle" onclick="toggleTheme()" class="px-4 py-2 rounded-full text-sm font-semibold transition" style="background-color: #1e293b; color: #f0c040;">🌙 وضع داكن</button>
    </div>
   </div>
   <div class="max-w-6xl mx-auto px-4 py-6">
    <div class="flex flex-col sm:flex-row gap-4 mb-6">
     <div class="flex-1 relative"><input type="text" id="search-input" class="search-box w-full px-4 py-3 rounded-xl border-0 text-sm" placeholder="ابحث عن الكتاب..." style="background-color: #1e293b; color: #f0c040;" onkeyup="handleSearch()"> <i data-lucide="search" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); width: 20px; height: 20px; color: #94a3b8; pointer-events: none;"></i>
     </div>
     <div class="flex gap-2"><button onclick="sortBooks('name')" data-sort="name" class="sort-badge px-4 py-3 rounded-xl text-sm font-semibold" style="background-color: #1e293b; color: #94a3b8;">أ-ي</button> <button onclick="sortBooks('newest')" data-sort="newest" class="sort-badge px-4 py-3 rounded-xl text-sm font-semibold" style="background-color: #1e293b; color: #94a3b8;">🆕 جديد</button> <button onclick="sortBooks('popular')" data-sort="popular" class="sort-badge px-4 py-3 rounded-xl text-sm font-semibold" style="background-color: #f0c040; color: #0f172a;">⭐ شهير</button>
     </div>
    </div>
   </div>
   <div class="flex flex-wrap justify-center gap-2 px-4 py-6"><button onclick="filterBooks('all')" data-filter="all" class="filter-btn active px-4 py-2 rounded-full text-sm font-semibold" style="background-color: #f0c040; color: #0f172a;">الكل</button> <button onclick="filterBooks('بلاغة')" data-filter="بلاغة" class="filter-btn px-4 py-2 rounded-full text-sm font-semibold" style="background-color: #1e293b; color: #94a3b8;">بلاغة</button> <button onclick="filterBooks('دين')" data-filter="دين" class="filter-btn px-4 py-2 rounded-full text-sm font-semibold" style="background-color: #1e293b; color: #94a3b8;">دين</button> <button onclick="filterBooks('فلسفة')" data-filter="فلسفة" class="filter-btn px-4 py-2 rounded-full text-sm font-semibold" style="background-color: #1e293b; color: #94a3b8;">فلسفة ومنطق</button> <button onclick="filterBooks('لغة')" data-filter="لغة" class="filter-btn px-4 py-2 rounded-full text-sm font-semibold" style="background-color: #1e293b; color: #94a3b8;">لغة عربية</button> <button onclick="filterBooks('رياضيات')" data-filter="رياضيات" class="filter-btn px-4 py-2 rounded-full text-sm font-semibold" style="background-color: #1e293b; color: #94a3b8;">رياضيات</button>
   </div>
   <div id="books-grid" class="max-w-6xl mx-auto px-4 pb-12 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5"></div>
   <div id="review-modal" class="modal-overlay">
    <div class="modal-content" style="color: #0f172a;">
     <h2 id="modal-title" class="text-2xl font-bold mb-4" style="color: #0f172a;">قيّم هذا الكتاب</h2>
     <div class="mb-4"><label class="block text-sm font-semibold mb-2">اسمك:</label> <input id="student-name" type="text" placeholder="أدخل اسمك" class="w-full px-3 py-2 border border-gray-300 rounded-lg" style="color: #0f172a;">
     </div>
     <div class="mb-4"><label class="block text-sm font-semibold mb-2">التقييم:</label>
      <div class="star-rating" id="star-rating" style="display: flex; gap: 12px; font-size: 36px;"></div>
     </div>
     <div class="mb-4"><label class="block text-sm font-semibold mb-2">ملاحظاتك:</label> <textarea id="review-text" placeholder="شارك رأيك وملاحظاتك..." class="w-full px-3 py-2 border border-gray-300 rounded-lg h-24" style="color: #0f172a;"></textarea>
     </div>
     <div class="flex gap-3"><button onclick="submitReview()" class="flex-1 px-4 py-2 rounded-lg font-semibold" style="background-color: #f0c040; color: #0f172a;">إرسال التقييم</button> <button onclick="closeReviewModal()" class="flex-1 px-4 py-2 rounded-lg font-semibold border" style="background-color: #e2e8f0; color: #0f172a;">إلغاء</button>
     </div>
    </div>
   </div>
   <div id="reviews-modal" class="modal-overlay">
    <div class="modal-content" style="color: #0f172a;">
     <h2 id="reviews-title" class="text-2xl font-bold mb-4" style="color: #0f172a;">التقييمات</h2>
     <div id="reviews-list" class="mb-4"></div><button onclick="closeReviewsModal()" class="w-full px-4 py-2 rounded-lg font-semibold" style="background-color: #e2e8f0; color: #0f172a;">إغلاق</button>
    </div>
   </div>
   <div class="text-center py-8 px-4" style="border-top: 1px solid #1e293b;">
    <p style="color: #475569;" class="text-sm">بالتوفيق يا أبطال 🌟 ذاكروا بذكاء وربنا يوفقكم</p>
   </div>
  </div>
  <script>
const books = [
  { title: "المرشد – بلاغة", icon: "📘", cat: "بلاغة", desc: "شرح مبسط ومنظم + أمثلة وأسئلة مراجعة", url: "https://drive.google.com/file/d/1pXucpoq2AFaGeQ7J97yqZEvecXh0GFrd/view?usp=drivesdk", date: 20260305, popular: 85 },
  { title: "المرشد – حديث", icon: "📗", cat: "دين", desc: "شرح مبسط لأهم أحاديث السنة + ملخصات سهلة", url: "https://drive.google.com/file/d/1-TrFsxzne3L8Nhx6Ce9vNebqtUpa510B/view?usp=drivesdk", date: 20260305, popular: 78 },
  { title: "ملخص بلاغة", icon: "📙", cat: "بلاغة", desc: "ملخص مهم ومركز في البلاغة + أمثلة سريعة", url: "https://drive.google.com/file/d/1BvmOxdHLK3X8OjDlZyso-qTiaPuurYDm/view?usp=drivesdk", date: 20260305, popular: 72 },
  { title: "الفلسفة والمنطق", icon: "🧠", cat: "فلسفة", desc: "شرح مبسط لأهم مفاهيم الفلسفة وقواعد المنطق", url: "https://drive.google.com/file/d/1-gVXvVRaWPXN_FD4eNk3e4Ctxi0tMylb/view?usp=drivesdk", date: 20260305, popular: 65 },
  { title: "بلاغة سلاح الأزهري", icon: "⚔️", cat: "بلاغة", desc: "ملف شامل ومنظم لشرح البلاغة + أمثلة مهمة", url: "https://drive.google.com/file/d/12PE-Av0f1RlZnjwOa-h9Q3UlgINknUy9/view?usp=drivesdk", date: 20260306, popular: 88 },
  { title: "المرشد – إنشاء", icon: "✍️", cat: "لغة", desc: "شرح مبسط ومنظم لموضوعات الإنشاء", url: "https://drive.google.com/file/d/1XYa2wPndygmwhrJHtpdwC2a4arIzBuZ6/view?usp=drivesdk", date: 20260305, popular: 70 },
  { title: "المرشد – توحيد", icon: "🕌", cat: "دين", desc: "شرح مبسّط لأهم مبادئ التوحيد + أسئلة مراجعة", url: "https://drive.google.com/file/d/10IZdVEnImYEALdfGvSqteG5ZWE2QrED1/view?usp=drivesdk", date: 20260305, popular: 73 },
  { title: "المرشد – فقه حنفي", icon: "📕", cat: "دين", desc: "شرح الفقه الحنفي بطريقة سهلة + أمثلة مراجعة", url: "https://drive.google.com/file/d/1-CcqhKNtf_uqzEdLhcMV49DdelZxTQ-p/view?usp=drivesdk", date: 20260305, popular: 68 },
  { title: "المنطق", icon: "🧩", cat: "فلسفة", desc: "شرح مبسط لأهم مفاهيم المنطق بطريقة سهلة", url: "https://drive.google.com/file/d/1mT8AdXIe3cpSi7zDip8qz2GYt3ezkCmY/view?usp=drivesdk", date: 20260310, popular: 90 },
  { title: "المرشد – صرف", icon: "📓", cat: "لغة", desc: "شرح مبسط ومنظم + أمثلة وأسئلة مراجعة", url: "https://drive.google.com/file/d/1lMnZqztmwscoSEnJtJozDtzV1wsKMEQ-/view?usp=drivesdk", date: 20260310, popular: 75 },
  { title: "إجابات المعاصر – رياضيات", icon: "🔢", cat: "رياضيات", desc: "حل جميع تدريبات كتاب المعاصر كاملة", url: "https://drive.google.com/file/d/1JLKN5t3YCBli-Qw2Pj86cRPs2-LgXSgv/view", date: 20260310, popular: 92 },
  { title: "المرشد – نحو", icon: "📓", cat: "لغة", desc: "شرح مبسط ومنظم + أمثلة وأسئلة مراجعة", url: "https://drive.google.com/file/d/1maPTZuaOIbg20s_aYv50sTKCSCfkd1hR/view?usp=drivesdk", date: 20260310, popular: 80 },
  { title: "صرف", icon: "📕", cat: "لغة", desc: "شرح مبسط لأهم مفاهيم المنطق بطريقة سهلة", url: "https://drive.google.com/file/d/1q9XbsU-ovDn6gTQ-2f3pgc4XxDIdO436/view?usp=drivesdk", date: 20260310, popular: 76 },
];

let currentFilter = 'all', currentSort = 'popular', isDarkMode = true;
let currentRatingBook = null;
let selectedRating = 0;
let allReviews = [];

const dataHandler = {
  onDataChanged(data) {
    allReviews = data || [];
  }
};

async function initializeDataSdk() {
  if (window.dataSdk) {
    const result = await window.dataSdk.init(dataHandler);
    if (!result.isOk) {
      console.error('Failed to initialize Data SDK');
    }
  }
}

function openReviewModal(bookTitle) {
  currentRatingBook = bookTitle;
  selectedRating = 0;
  document.getElementById('modal-title').textContent = `قيّم: ${bookTitle}`;
  document.getElementById('student-name').value = '';
  document.getElementById('review-text').value = '';
  resetStarRating();
  document.getElementById('review-modal').classList.add('active');
  setupStarRating();
}

function closeReviewModal() {
  document.getElementById('review-modal').classList.remove('active');
  currentRatingBook = null;
  selectedRating = 0;
}

function setupStarRating() {
  const starContainer = document.getElementById('star-rating');
  starContainer.innerHTML = '';
  for (let i = 1; i <= 5; i++) {
    const star = document.createElement('span');
    star.textContent = '⭐';
    star.dataset.value = i;
    star.style.cursor = 'pointer';
    star.style.opacity = '0.3';
    star.style.transition = 'all 0.2s ease';
    star.onclick = () => {
      selectedRating = i;
      updateStarDisplay();
    };
    starContainer.appendChild(star);
  }
}

function updateStarDisplay() {
  document.querySelectorAll('#star-rating span').forEach(star => {
    const value = parseInt(star.dataset.value);
    if (value <= selectedRating) {
      star.style.opacity = '1';
      star.style.transform = 'scale(1.1)';
    } else {
      star.style.opacity = '0.3';
      star.style.transform = 'scale(1)';
    }
  });
}

function resetStarRating() {
  document.querySelectorAll('#star-rating span').forEach(star => {
    star.style.opacity = '0.3';
    star.style.transform = 'scale(1)';
  });
}

async function submitReview() {
  const name = document.getElementById('student-name').value.trim();
  const text = document.getElementById('review-text').value.trim();

  if (!name) {
    showError('من فضلك أدخل اسمك');
    return;
  }
  if (selectedRating === 0) {
    showError('من فضلك اختر تقييم');
    return;
  }
  if (!text) {
    showError('من فضلك اكتب ملاحظاتك');
    return;
  }

  try {
    if (window.dataSdk) {
      const result = await window.dataSdk.create({
        book_title: currentRatingBook,
        student_name: name,
        rating: selectedRating,
        review: text,
        date: new Date().toISOString()
      });

      if (result.isOk) {
        closeReviewModal();
        showError('✅ تم حفظ التقييم بنجاح!');
      } else {
        showError('❌ حدث خطأ: ' + (result.error?.message || 'حاول مرة أخرى'));
      }
    } else {
      showError('⚠️ Data SDK غير متاح');
    }
  } catch (err) {
    showError('❌ خطأ: ' + err.message);
  }
}

function showError(message) {
  const errorDiv = document.createElement('div');
  errorDiv.style.cssText = 'position: fixed; top: 20px; left: 20px; background: #ef4444; color: white; padding: 12px 16px; border-radius: 8px; z-index: 2000; font-weight: bold;';
  errorDiv.textContent = message;
  document.body.appendChild(errorDiv);
  setTimeout(() => errorDiv.remove(), 3000);
}

function openReviewsModal(bookTitle) {
  const bookReviews = allReviews.filter(r => r.book_title === bookTitle);
  const modal = document.getElementById('reviews-modal');
  document.getElementById('reviews-title').textContent = `تقييمات: ${bookTitle}`;
  
  const listDiv = document.getElementById('reviews-list');
  listDiv.innerHTML = '';

  if (bookReviews.length === 0) {
    listDiv.innerHTML = '<p style="color: #64748b; text-align: center;">لا توجد تقييمات حتى الآن</p>';
  } else {
    bookReviews.forEach(review => {
      const reviewEl = document.createElement('div');
      reviewEl.className = 'review-item';
      reviewEl.innerHTML = `
        <div class="review-item-header">
          <div>
            <strong style="color: #0f172a;">${review.student_name}</strong>
            <span class="review-stars"> ${'⭐'.repeat(review.rating)}</span>
          </div>
        </div>
        <p style="color: #475569; font-size: 14px;">${review.review}</p>
      `;
      listDiv.appendChild(reviewEl);
    });
  }

  modal.classList.add('active');
}

function closeReviewsModal() {
  document.getElementById('reviews-modal').classList.remove('active');
}

async function deleteReview(reviewId) {
  const review = allReviews.find(r => r.__backendId === reviewId);
  if (!review) return;

  if (window.dataSdk) {
    const result = await window.dataSdk.delete(review);
    if (result.isOk) {
      // Review will be removed via onDataChanged
    }
  }
}

function handleSearch() {
  const searchTerm = document.getElementById('search-input').value.toLowerCase();
  let filtered = currentFilter === 'all' ? books : books.filter(b => b.cat === currentFilter);
  filtered = filtered.filter(b => b.title.includes(searchTerm) || b.desc.includes(searchTerm) || b.cat.includes(searchTerm));
  applyCurrentSort(filtered);
}

function sortBooks(type) {
  currentSort = type;
  updateSortButtons();
  applySort();
}

function updateSortButtons() {
  document.querySelectorAll('.sort-badge').forEach(btn => {
    const isActive = btn.dataset.sort === currentSort;
    btn.style.backgroundColor = isActive ? (isDarkMode ? '#f0c040' : '#d97706') : (isDarkMode ? '#1e293b' : '#e2e8f0');
    btn.style.color = isActive ? (isDarkMode ? '#0f172a' : '#ffffff') : (isDarkMode ? '#94a3b8' : '#64748b');
  });
}

function applySort() {
  let filtered = currentFilter === 'all' ? [...books] : books.filter(b => b.cat === currentFilter);
  const searchTerm = document.getElementById('search-input').value.toLowerCase();
  filtered = filtered.filter(b => b.title.includes(searchTerm) || b.desc.includes(searchTerm) || b.cat.includes(searchTerm));
  applyCurrentSort(filtered);
}

function applyCurrentSort(filtered) {
  if (currentSort === 'name') filtered.sort((a, b) => a.title.localeCompare(b.title, 'ar'));
  else if (currentSort === 'newest') filtered.sort((a, b) => b.date - a.date);
  else if (currentSort === 'popular') filtered.sort((a, b) => b.popular - a.popular);
  renderBooks(filtered);
}

function toggleTheme() {
  isDarkMode = !isDarkMode;
  const app = document.getElementById('app');
  const btn = document.getElementById('theme-toggle');
  if (isDarkMode) {
    app.style.backgroundColor = '#0f172a';
    btn.textContent = '🌙 وضع داكن';
    btn.style.backgroundColor = '#1e293b';
    btn.style.color = '#f0c040';
  } else {
    app.style.backgroundColor = '#f8fafc';
    btn.textContent = '☀️ وضع فاتح';
    btn.style.backgroundColor = '#ffffff';
    btn.style.color = '#d97706';
  }
  updateSearchStyles();
  updateSortButtons();
  applySort();
}

function updateSearchStyles() {
  const input = document.getElementById('search-input');
  if (isDarkMode) {
    input.style.backgroundColor = '#1e293b';
    input.style.color = '#f0c040';
  } else {
    input.style.backgroundColor = '#ffffff';
    input.style.color = '#d97706';
  }
}

function renderBooks(filtered) {
  const grid = document.getElementById('books-grid');
  grid.innerHTML = '';
  const bgColor = isDarkMode ? '#1e293b' : '#ffffff';
  const textColor = isDarkMode ? '#94a3b8' : '#64748b';
  const titleColor = isDarkMode ? '#f0c040' : '#d97706';
  const tagBg = isDarkMode ? '#0f172a' : '#f1f5f9';
  
  filtered.forEach((book, i) => {
    const bookReviews = allReviews.filter(r => r.book_title === book.title);
    const avgRating = bookReviews.length > 0 
      ? (bookReviews.reduce((sum, r) => sum + r.rating, 0) / bookReviews.length).toFixed(1)
      : null;

    const card = document.createElement('div');
    card.className = 'book-card animate-card rounded-2xl p-5 flex flex-col';
    card.style.cssText = `background-color: ${bgColor}; animation-delay: ${i * 0.07}s;`;
    card.innerHTML = `
      <div class="text-4xl mb-3">${book.icon}</div>
      <h3 class="text-lg font-bold mb-1" style="color: ${titleColor};">${book.title}</h3>
      <span class="inline-block text-xs px-2 py-1 rounded-full mb-3 w-fit font-semibold" style="background-color: ${tagBg}; color: ${textColor};">${book.cat}</span>
      <p class="text-sm mb-4 flex-1" style="color: ${textColor};">${book.desc}</p>
      ${avgRating ? `<div class="mb-3 text-sm" style="color: #f0c040;">⭐ ${avgRating} (${bookReviews.length} تقييم)</div>` : ''}
      <div class="flex gap-2">
        <a href="${book.url}" target="_blank" rel="noopener noreferrer" class="download-btn flex-1 inline-flex items-center justify-center gap-2 px-4 py-3 rounded-xl text-sm font-bold" style="background-color: ${titleColor}; color: ${isDarkMode ? '#0f172a' : '#ffffff'};"><i data-lucide="download" style="width:18px;height:18px;"></i>تحميل</a>
        <button onclick="openReviewModal('${book.title.replace(/'/g, "\\'")}')" class="download-btn px-4 py-3 rounded-xl text-sm font-bold" style="background-color: #8b5cf6; color: white;"><i data-lucide="message-circle" style="width:18px;height:18px;"></i></button>
        <button onclick="openReviewsModal('${book.title.replace(/'/g, "\\'")}')" class="download-btn px-4 py-3 rounded-xl text-sm font-bold" style="background-color: #f0c040; color: #0f172a;"><i data-lucide="star" style="width:18px;height:18px;"></i></button>
      </div>
    `;
    grid.appendChild(card);
  });
  if (filtered.length === 0) grid.innerHTML = `<div class="col-span-full text-center py-12" style="color: ${textColor};">لا توجد كتب تطابق البحث</div>`;
  lucide.createIcons();
}

function filterBooks(cat) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(btn => {
    const isActive = btn.dataset.filter === cat;
    const activeColor = isDarkMode ? '#f0c040' : '#d97706';
    const inactiveColor = isDarkMode ? '#1e293b' : '#e2e8f0';
    btn.style.backgroundColor = isActive ? activeColor : inactiveColor;
    btn.style.color = isActive ? (isDarkMode ? '#0f172a' : '#ffffff') : (isDarkMode ? '#94a3b8' : '#64748b');
    btn.classList.toggle('active', isActive);
  });
  applySort();
}

const defaultConfig = {
  library_title: "مكتبة أولى ثانوي",
  subtitle: "الترم الثاني – كل الكتب في مكان واحد 🚀",
  search_placeholder: "ابحث عن الكتاب...",
  empty_message: "لا توجد كتب تطابق البحث",
  background_color: "#0f172a",
  surface_color: "#1e293b",
  text_color: "#94a3b8",
  accent_color: "#f0c040",
  font_family: "Noto Kufi Arabic",
  font_size: 16
};

function applyConfig(config) {
  const font = config.font_family || defaultConfig.font_family;
  const fs = config.font_size || defaultConfig.font_size;
  document.getElementById('main-title').textContent = config.library_title || defaultConfig.library_title;
  document.getElementById('main-title').style.fontFamily = `${font}, sans-serif`;
  document.getElementById('main-title').style.fontSize = `${fs * 2}px`;
  document.getElementById('main-subtitle').textContent = config.subtitle || defaultConfig.subtitle;
  document.getElementById('main-subtitle').style.fontFamily = `${font}, sans-serif`;
  document.getElementById('main-subtitle').style.fontSize = `${fs}px`;
  document.getElementById('search-input').placeholder = config.search_placeholder || defaultConfig.search_placeholder;
}

if (window.elementSdk) {
  window.elementSdk.init({
    defaultConfig,
    onConfigChange: async (config) => { applyConfig(config); },
    mapToCapabilities: (config) => ({
      recolorables: [
        { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
        { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
        { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
        { get: () => config.accent_color || defaultConfig.accent_color, set: (v) => { config.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); } },
      ],
      borderables: [],
      fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
      fontSizeable: { get: () => config.font_size || defaultConfig.font_size, set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); } },
    }),
    mapToEditPanelValues: (config) => new Map([
      ["library_title", config.library_title || defaultConfig.library_title],
      ["subtitle", config.subtitle || defaultConfig.subtitle],
      ["search_placeholder", config.search_placeholder || defaultConfig.search_placeholder],
      ["empty_message", config.empty_message || defaultConfig.empty_message],
    ])
  });
}

initializeDataSdk();

sortBooks('popular');
