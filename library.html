<!doctype html>
<html lang="ar" dir="rtl" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;600;700;800&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Noto Kufi Arabic', sans-serif; }
    .book-card {
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .book-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.15);
    }
    .download-btn {
      transition: all 0.25s ease;
    }
    .download-btn:hover {
      transform: scale(1.05);
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-card {
      animation: fadeUp 0.5s ease forwards;
      opacity: 0;
    }
    .filter-btn {
      transition: all 0.2s ease;
    }
    .filter-btn.active {
      transform: scale(1.05);
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app" class="w-full h-full overflow-auto" style="background-color: #0f172a;"><!-- Header -->
   <div class="text-center py-10 px-4" style="background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);">
    <div class="text-5xl mb-4">
     📚
    </div>
    <h1 id="main-title" class="text-3xl md:text-4xl font-extrabold mb-3" style="color: #f0c040;">مكتبة أولى ثانوي</h1>
    <p id="main-subtitle" class="text-lg" style="color: #94a3b8;">الترم الثاني – كل الكتب في مكان واحد 🚀</p>
   </div><!-- Filter -->
   <div class="flex flex-wrap justify-center gap-2 px-4 py-6"><button onclick="filterBooks('all')" data-filter="all" class="filter-btn active px-4 py-2 rounded-full text-sm font-semibold" style="background-color: #f0c040; color: #0f172a;">الكل</button> <button onclick="filterBooks('بلاغة')" data-filter="بلاغة" class="filter-btn px-4 py-2 rounded-full text-sm font-semibold" style="background-color: #1e293b; color: #94a3b8;">بلاغة</button> <button onclick="filterBooks('دين')" data-filter="دين" class="filter-btn px-4 py-2 rounded-full text-sm font-semibold" style="background-color: #1e293b; color: #94a3b8;">دين</button> <button onclick="filterBooks('فلسفة')" data-filter="فلسفة" class="filter-btn px-4 py-2 rounded-full text-sm font-semibold" style="background-color: #1e293b; color: #94a3b8;">فلسفة ومنطق</button> <button onclick="filterBooks('لغة')" data-filter="لغة" class="filter-btn px-4 py-2 rounded-full text-sm font-semibold" style="background-color: #1e293b; color: #94a3b8;">لغة عربية</button> <button onclick="filterBooks('رياضيات')" data-filter="رياضيات" class="filter-btn px-4 py-2 rounded-full text-sm font-semibold" style="background-color: #1e293b; color: #94a3b8;">رياضيات</button>
   </div><!-- Books Grid -->
   <div id="books-grid" class="max-w-6xl mx-auto px-4 pb-12 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
   </div><!-- Footer -->
   <div class="text-center py-8 px-4" style="border-top: 1px solid #1e293b;">
    <p style="color: #475569;" class="text-sm">بالتوفيق يا أبطال 🌟 ذاكروا بذكاء وربنا يوفقكم</p>
   </div>
  </div>
  <script>
const books = [
  { title: "المرشد – بلاغة", icon: "📘", cat: "بلاغة", desc: "شرح مبسط ومنظم + أمثلة وأسئلة مراجعة", url: "https://drive.google.com/file/d/1pXucpoq2AFaGeQ7J97yqZEvecXh0GFrd/view?usp=drivesdk" },
  { title: "المرشد – حديث", icon: "📗", cat: "دين", desc: "شرح مبسط لأهم أحاديث السنة + ملخصات سهلة", url: "https://drive.google.com/file/d/1-TrFsxzne3L8Nhx6Ce9vNebqtUpa510B/view?usp=drivesdk" },
  { title: "ملخص بلاغة", icon: "📙", cat: "بلاغة", desc: "ملخص مهم ومركز في البلاغة + أمثلة سريعة", url: "https://drive.google.com/file/d/1BvmOxdHLK3X8OjDlZyso-qTiaPuurYDm/view?usp=drivesdk" },
  { title: "الفلسفة والمنطق", icon: "🧠", cat: "فلسفة", desc: "شرح مبسط لأهم مفاهيم الفلسفة وقواعد المنطق", url: "https://drive.google.com/file/d/1-gVXvVRaWPXN_FD4eNk3e4Ctxi0tMylb/view?usp=drivesdk" },
  { title: "بلاغة سلاح الأزهري", icon: "⚔️", cat: "بلاغة", desc: "ملف شامل ومنظم لشرح البلاغة + أمثلة مهمة", url: "https://drive.google.com/file/d/12PE-Av0f1RlZnjwOa-h9Q3UlgINknUy9/view?usp=drivesdk" },
  { title: "المرشد – إنشاء", icon: "✍️", cat: "لغة", desc: "شرح مبسط ومنظم لموضوعات الإنشاء", url: "https://drive.google.com/file/d/1XYa2wPndygmwhrJHtpdwC2a4arIzBuZ6/view?usp=drivesdk" },
  { title: "المرشد – توحيد", icon: "🕌", cat: "دين", desc: "شرح مبسّط لأهم مبادئ التوحيد + أسئلة مراجعة", url: "https://drive.google.com/file/d/10IZdVEnImYEALdfGvSqteG5ZWE2QrED1/view?usp=drivesdk" },
  { title: "المرشد – فقه حنفي", icon: "📕", cat: "دين", desc: "شرح الفقه الحنفي بطريقة سهلة + أمثلة مراجعة", url: "https://drive.google.com/file/d/1-CcqhKNtf_uqzEdLhcMV49DdelZxTQ-p/view?usp=drivesdk" },
  { title: "المنطق", icon: "🧩", cat: "فلسفة", desc: "شرح مبسط لأهم مفاهيم المنطق بطريقة سهلة", url: "https://drive.google.com/file/d/1mT8AdXIe3cpSi7zDip8qz2GYt3ezkCmY/view?usp=drivesdk" },
  { title: "المرشد – صرف", icon: "📓", cat: "لغة", desc: "شرح مبسط ومنظم + أمثلة وأسئلة مراجعة", url: "https://drive.google.com/file/d/1lMnZqztmwscoSEnJtJozDtzV1wsKMEQ-/view?usp=drivesdk" },
  { title: "إجابات المعاصر – رياضيات", icon: "🔢", cat: "رياضيات", desc: "حل جميع تدريبات كتاب المعاصر كاملة", url: "https://drive.google.com/file/d/1JLKN5t3YCBli-Qw2Pj86cRPs2-LgXSgv/view" },
];

let currentFilter = 'all';

function renderBooks(filter) {
  const grid = document.getElementById('books-grid');
  grid.innerHTML = '';
  const filtered = filter === 'all' ? books : books.filter(b => b.cat === filter);
  
  filtered.forEach((book, i) => {
    const card = document.createElement('div');
    card.className = 'book-card animate-card rounded-2xl p-5 flex flex-col';
    card.style.cssText = `background-color: #1e293b; animation-delay: ${i * 0.07}s;`;
    card.innerHTML = `
      <div class="text-4xl mb-3">${book.icon}</div>
      <h3 class="text-lg font-bold mb-1" style="color: #f0c040;">${book.title}</h3>
      <span class="inline-block text-xs px-2 py-1 rounded-full mb-3 w-fit font-semibold" style="background-color: #0f172a; color: #94a3b8;">${book.cat}</span>
      <p class="text-sm mb-4 flex-1" style="color: #94a3b8;">${book.desc}</p>
      <a href="${book.url}" target="_blank" rel="noopener noreferrer" class="download-btn inline-flex items-center justify-center gap-2 px-4 py-3 rounded-xl text-sm font-bold" style="background-color: #f0c040; color: #0f172a;">
        <i data-lucide="download" style="width:18px;height:18px;"></i>
        تحميل الكتاب
      </a>
    `;
    grid.appendChild(card);
  });

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="col-span-full text-center py-12" style="color: #94a3b8;">لا توجد كتب في هذا التصنيف</div>`;
  }

  lucide.createIcons();
}

function filterBooks(cat) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(btn => {
    const isActive = btn.dataset.filter === cat;
    btn.classList.toggle('active', isActive);
    btn.style.backgroundColor = isActive ? '#f0c040' : '#1e293b';
    btn.style.color = isActive ? '#0f172a' : '#94a3b8';
  });
  renderBooks(cat);
}

// Element SDK
const defaultConfig = {
  library_title: "مكتبة أولى ثانوي",
  subtitle: "الترم الثاني – كل الكتب في مكان واحد 🚀",
  background_color: "#0f172a",
  surface_color: "#1e293b",
  text_color: "#94a3b8",
  accent_color: "#f0c040",
  font_family: "Noto Kufi Arabic",
  font_size: 16
};

function applyConfig(config) {
  const bg = config.background_color || defaultConfig.background_color;
  const surface = config.surface_color || defaultConfig.surface_color;
  const text = config.text_color || defaultConfig.text_color;
  const accent = config.accent_color || defaultConfig.accent_color;
  const font = config.font_family || defaultConfig.font_family;
  const fs = config.font_size || defaultConfig.font_size;

  document.getElementById('app').style.backgroundColor = bg;
  document.getElementById('main-title').textContent = config.library_title || defaultConfig.library_title;
  document.getElementById('main-title').style.color = accent;
  document.getElementById('main-title').style.fontFamily = `${font}, sans-serif`;
  document.getElementById('main-title').style.fontSize = `${fs * 2}px`;
  document.getElementById('main-subtitle').textContent = config.subtitle || defaultConfig.subtitle;
  document.getElementById('main-subtitle').style.color = text;
  document.getElementById('main-subtitle').style.fontFamily = `${font}, sans-serif`;
  document.getElementById('main-subtitle').style.fontSize = `${fs}px`;

  document.querySelectorAll('.book-card').forEach(card => {
    card.style.backgroundColor = surface;
    card.querySelector('h3').style.color = accent;
    card.querySelector('p').style.color = text;
    card.querySelector('span').style.backgroundColor = bg;
    card.querySelector('span').style.color = text;
    const btn = card.querySelector('.download-btn');
    btn.style.backgroundColor = accent;
    btn.style.color = bg;
  });

  document.querySelectorAll('.filter-btn').forEach(btn => {
    const isActive = btn.classList.contains('active');
    btn.style.backgroundColor = isActive ? accent : surface;
    btn.style.color = isActive ? bg : text;
  });
}

if (window.elementSdk) {
  window.elementSdk.init({
    defaultConfig,
    onConfigChange: async (config) => { applyConfig(config); },
    mapToCapabilities: (config) => ({
      recolorables: [
        { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
        { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
        { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
        { get: () => config.accent_color || defaultConfig.accent_color, set: (v) => { config.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); } },
      ],
      borderables: [],
      fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
      fontSizeable: { get: () => config.font_size || defaultConfig.font_size, set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); } },
    }),
    mapToEditPanelValues: (config) => new Map([
      ["library_title", config.library_title || defaultConfig.library_title],
      ["subtitle", config.subtitle || defaultConfig.subtitle],
    ])
  });
}

renderBooks('all');
</script>
